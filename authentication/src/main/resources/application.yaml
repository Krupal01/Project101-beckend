server:
  port: 8081
spring:
  application:
    name: authentication

  datasource:
    url: jdbc:postgresql://localhost:5433/auth_db
    username: auth_user
    password: auth_pass

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

jwt:
  secret: my-super-secure-secret-key-my-super-secure-secret-key
  access-token-expiration: 900000
  refresh-token-expiration: 604800000

eureka:
  client:
    enabled: false

auth:
  public-paths:
    - /api/v1/auth/**
  otp:
    enabled: false
  security:
    secret: my-super-secure-secret-key-my-super-secure-secret-key

# Dev (default — no entry needed, console is the default)
sms:
  provider: console

# ─── Switch to this for production ───
#sms:
#  provider: twilio

twilio:
  account-sid: ACxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx
  auth-token: your_auth_token
  from-number: "+1XXXXXXXXXX"
