server:
  port: 8081
spring:
  application:
    name: authentication

  datasource:
    url: jdbc:postgresql://localhost:5433/auth_db
    username: auth_user
    password: auth_pass

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

jwt:
  secret: my-super-secure-secret-key-my-super-secure-secret-key
  access-token-expiration: 900000
  refresh-token-expiration: 604800000

eureka:
  client:
    enabled: false

auth:
  public-paths:
    - /api/auth/**
  security:
    secret: my-super-secure-secret-key-my-super-secure-secret-key
